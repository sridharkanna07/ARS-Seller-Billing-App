<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A.R.S Seller Billing App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Roboto, 'Noto Sans Tamil', Arial, sans-serif;
            background: linear-gradient(160deg, #4a0c0c 0%, #7a1414 45%, #a8581a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            text-align: center;
            background: rgba(0,0,0,0.1);
            border: 2px solid #ffd34d;
            border-radius: 20px;
            padding: 40px 30px;
            max-width: 400px;
            color: #fff8ea;
        }
        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: radial-gradient(circle at 30% 30%, #c9651a, #4a0c0c 75%);
            border: 2px solid #ffd34d;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: bold;
            color: #ffd34d;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            color: #fff8ea;
        }
        .tamil {
            font-size: 14px;
            color: #ffd34d;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }
        p {
            font-size: 14px;
            color: #ffe1a8;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            background: #ffd34d;
            color: #4a0c0c;
            padding: 14px 30px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 800;
            font-size: 14px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        .btn:hover {
            background: #ffdb70;
            transform: scale(1.05);
        }
        .loading {
            display: none;
            margin-top: 20px;
            font-size: 12px;
            color: #ffe1a8;
        }
        .spinner {
            border: 2px solid rgba(255,255,255,0.3);
            border-top: 2px solid #ffd34d;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">A</div>
        <h1>A.R.S CRACKERS SHOP</h1>
        <div class="tamil">A.R.S பட்டாசுக் கடை</div>
        <p>Professional Seller Billing App<br>விற்பனையாளர் பில்லிங் செயலி</p>
        
        <button class="btn" onclick="launchApp()">
            Launch App ▶
        </button>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Loading application...</p>
        </div>
    </div>

    <script>
        // Redirect to the main app
        function launchApp() {
            document.getElementById('loading').style.display = 'block';
            // Redirect after a short delay to show loading
            setTimeout(() => {
                window.location.href = 'ARS_Seller_Billing_App.html';
            }, 500);
        }
        
        // Auto-launch on page load (optional)
        // Uncomment the line below if you want to auto-redirect without button click
        // window.addEventListener('load', () => { launchApp(); });
    </script>
</body>
</html>
